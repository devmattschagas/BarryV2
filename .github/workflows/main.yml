name: main

on:
  push:
  pull_request:

jobs:
  android:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.5
          channel: stable
          cache: true
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Bootstrap
        run: |
          dart pub global activate melos
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"
          melos bootstrap

      - name: Analyze
        run: melos run analyze

      - name: Test
        run: melos run test

      - name: Decode keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > apps/barry_mobile_hud_live/android/release.jks

      - name: Select build mode
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "FLUTTER_BUILD_MODE=debug" >> "$GITHUB_ENV"
          else
            echo "FLUTTER_BUILD_MODE=release" >> "$GITHUB_ENV"
          fi

      - name: Validate source native libs
        run: |
          python - <<'PYCODE'
          from pathlib import Path

          root = Path('apps/barry_mobile_hud_live/android/app/src/main/jniLibs')
          if not root.exists():
              raise SystemExit('jniLibs directory not found')

          for so_path in root.rglob('*.so'):
              if so_path.name.startswith('stub-'):
                  raise SystemExit(f'Stub library found: {so_path}')
              with so_path.open('rb') as f:
                  magic = f.read(4)
              if magic != bytes.fromhex('7f454c46'):
                  raise SystemExit(f'Invalid ELF library: {so_path}')

          print('Source native libraries validated')
          PYCODE

      - name: Build APK
        run: |
          cd apps/barry_mobile_hud_live
          flutter build apk --"$FLUTTER_BUILD_MODE" --verbose

      - name: Validate native libs
        run: |
          set -euo pipefail
          APK=$(find apps/barry_mobile_hud_live/build/app/outputs/flutter-apk -name '*.apk' | head -n 1)
          if [ -z "${APK:-}" ]; then
            echo "No APK found after build" >&2
            exit 1
          fi

          scripts/check_native_libs.sh "$APK"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: barry-mobile-hud-live-apk-${{ env.FLUTTER_BUILD_MODE }}
          path: apps/barry_mobile_hud_live/build/app/outputs/flutter-apk/*.apk
