name: main

on:
  push:
  pull_request:

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Bootstrap
        run: |
          dart pub global activate melos
          melos bootstrap

      - name: Analyze
        run: melos run analyze

      - name: Test
        run: melos run test

      - name: Decode keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > apps/barry_mobile_hud_live/android/release.jks
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Build APK
        run: |
          cd apps/barry_mobile_hud_live
          flutter build apk --release

      - name: Validate native libs
        run: |
          APK=$(find apps/barry_mobile_hud_live/build/app/outputs/flutter-apk -name '*.apk' | head -n 1)
          unzip -l "$APK" | rg 'lib/(arm64-v8a|armeabi-v7a)/(libzeptoclaw.so|libbarry_vad_native.so|libonnxruntime.so|libbarry_whisper_worker.so)'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: barry-mobile-hud-live-apk
          path: apps/barry_mobile_hud_live/build/app/outputs/flutter-apk/*.apk
