name: main

on:
  push:
  pull_request:

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - uses: android-actions/setup-android@v3
        with:
          packages: >-
            platform-tools
            platforms;android-35
            build-tools;35.0.0
            cmake;3.22.1
            ndk;27.0.12077973

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.5
          cache: true

      - name: Bootstrap
        run: |
          dart pub global activate melos
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"
          melos bootstrap

      - name: Analyze
        run: melos run analyze

      - name: Test
        run: melos run test

      - name: Decode keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > apps/barry_mobile_hud_live/android/release.jks
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Build APK
        run: |
          cd apps/barry_mobile_hud_live
          flutter build apk --release

      - name: Validate native libs
        run: |
          set -euo pipefail
          APK=$(find apps/barry_mobile_hud_live/build/app/outputs/flutter-apk -name '*.apk' | head -n 1)
          if [ -z "${APK:-}" ]; then
            echo "No APK found after build" >&2
            exit 1
          fi

          unzip -l "$APK" | grep -E 'lib/(arm64-v8a|armeabi-v7a)/(libzeptoclaw\.so|libbarry_vad_native\.so|libonnxruntime\.so|libbarry_whisper_worker\.so)'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: barry-mobile-hud-live-apk
          path: apps/barry_mobile_hud_live/build/app/outputs/flutter-apk/*.apk
