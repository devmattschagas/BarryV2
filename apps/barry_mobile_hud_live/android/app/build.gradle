plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
    id 'dev.flutter.flutter-gradle-plugin'
}

android {
    namespace 'com.barry.mobile_hud_live'
    compileSdk flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    defaultConfig {
        applicationId 'com.barry.mobile_hud_live'
        minSdk 24
        targetSdk flutter.targetSdkVersion
        versionCode flutter.versionCode
        versionName flutter.versionName
        ndk {
            abiFilters 'arm64-v8a', 'armeabi-v7a', 'x86_64'
        }
    }

    externalNativeBuild {
        cmake {
            path '../../../../packages/barry_native_ffi/native/CMakeLists.txt'
        }
    }

    def hasReleaseSigning = file('release.jks').exists()
        && System.getenv('ANDROID_KEYSTORE_PASSWORD')
        && System.getenv('ANDROID_KEY_ALIAS')
        && System.getenv('ANDROID_KEY_PASSWORD')

    signingConfigs {
        release {
            if (hasReleaseSigning) {
                storeFile file('release.jks')
                storePassword System.getenv('ANDROID_KEYSTORE_PASSWORD')
                keyAlias System.getenv('ANDROID_KEY_ALIAS')
                keyPassword System.getenv('ANDROID_KEY_PASSWORD')
            }
        }
    }

    buildTypes {
        release {
            signingConfig hasReleaseSigning ? signingConfigs.release : signingConfigs.debug
            minifyEnabled false
        }
    }

    packaging {
        jniLibs {
            useLegacyPackaging = false
        }
    }
}

flutter {
    source '../..'
}
