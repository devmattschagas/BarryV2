plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
    id 'dev.flutter.flutter-gradle-plugin'
}

android {
    namespace 'com.barry.mobile_hud_live'
    compileSdkVersion flutter.compileSdkVersion
    ndkVersion '28.2.13676358'

    defaultConfig {
        applicationId 'com.barry.mobile_hud_live'
        minSdkVersion 24
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutter.versionCode
        versionName flutter.versionName
        ndk {
            abiFilters 'arm64-v8a', 'armeabi-v7a'
        }
    }

    externalNativeBuild {
        cmake {
            path '../../../../packages/barry_native_ffi/native/CMakeLists.txt'
        }
    }

    sourceSets {
        main {
            // Avoid bundling placeholder/prebuilt .so files from src/main/jniLibs.
            // Native libs are provided by externalNativeBuild (CMake) outputs.
            jniLibs.srcDirs = []
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging true
        }
    }
}

flutter {
    source '../..'
}
