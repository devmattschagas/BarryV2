pluginManagement {
    def resolveFlutterSdkPath = {
        def localProperties = new Properties()
        def localPropertiesFile = file('local.properties')
        if (localPropertiesFile.exists()) {
            localPropertiesFile.withInputStream { localProperties.load(it) }
        }

        def fromLocalProperties = localProperties.getProperty('flutter.sdk')
        if (fromLocalProperties != null && !fromLocalProperties.isBlank()) {
            return fromLocalProperties
        }

        def fromEnv = System.getenv('FLUTTER_ROOT')
        if (fromEnv != null && !fromEnv.isBlank()) {
            return fromEnv
        }

        throw new GradleException('Unable to resolve Flutter SDK path. Set flutter.sdk in local.properties or FLUTTER_ROOT env var.')
    }

    def flutterSdkPath = resolveFlutterSdkPath()
    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id 'dev.flutter.flutter-plugin-loader' version '1.0.0'
    id 'com.android.application' version '8.4.2' apply false
    id 'org.jetbrains.kotlin.android' version '1.9.24' apply false
}

include ':app'
